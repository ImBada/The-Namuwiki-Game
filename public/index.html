<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나무위키 게임</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-board" aria-live="polite">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">N</span>
            <div>
              <h1>나무위키 게임</h1>
              <p>링크만 타고 목표 문서까지</p>
            </div>
          </div>
          <div class="top-actions">
            <span id="roundStatus" class="status-pill">라운드 준비</span>
            <button id="newRoundButton" class="primary-button" type="button">새 라운드</button>
          </div>
        </header>

        <section class="round-strip">
          <article class="round-tile">
            <span>시작</span>
            <strong id="startTitle">-</strong>
          </article>
          <article class="round-tile goal">
            <span>목표</span>
            <strong id="goalTitle">-</strong>
          </article>
          <article class="stat-tile">
            <span>시간</span>
            <strong id="timer">00:00</strong>
          </article>
          <article class="stat-tile">
            <span>클릭</span>
            <strong id="clickCount">0</strong>
          </article>
          <article class="stat-tile difficulty-tile">
            <span>난이도</span>
            <strong id="difficultyLabel">-</strong>
          </article>
        </section>

        <section class="content-grid">
          <article class="wiki-stage">
            <header class="wiki-stage-header">
              <div>
                <span>현재 문서</span>
                <h2 id="articleTitle">라운드를 시작하세요</h2>
              </div>
              <a id="sourceLink" class="source-link" href="https://namu.wiki/" rel="noreferrer" target="_blank">원문</a>
            </header>
            <p id="articleDescription" class="article-summary">새 라운드를 누르면 시작 문서와 목표 문서가 정해집니다.</p>
            <div id="wikiArticle" class="wiki-article">
              <p class="wiki-placeholder">문서를 불러오는 중입니다.</p>
            </div>
          </article>
        </section>

        <section class="path-panel">
          <div class="panel-heading">
            <h2>경로</h2>
          </div>
          <ol id="pathList" class="path-list"></ol>
        </section>

        <footer class="license-line">
          문서 데이터 출처: <a href="https://namu.wiki/" rel="noreferrer" target="_blank">namu.wiki</a>.
          문서 내용은 각 문서의 라이선스를 따릅니다.
        </footer>
      </section>

      <dialog id="resultDialog" class="result-dialog">
        <h2>도착</h2>
        <p id="resultSummary"></p>
        <button id="dialogNewRoundButton" class="primary-button" type="button">다음 라운드</button>
      </dialog>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
